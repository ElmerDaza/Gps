{%extends "Plantilla.html" %}
{%block body%}
    <h1 class="titulo">Ingrese contenido Solicitado</h1>
    
    <form action="/Modificar/{{dat.0}}" method="POST">
        <div class="ContenedorN" id="">

            <div class="seccion">
                <input type="text" name="Nombre_Completo" value="{{dat.1}}" autocomplete="off" required>
                <label for="Nombre_Completo" class="Label_Nombre_Completo">
                    <span class="contenido_Nombre_Completo">Nombre Completo.</span>
                </label>
            </div>

            <div class="seccion">
                <input type="text" name="Telefono" value="{{dat.2}}" autocomplete="off" required>
                <label for="Telefono" class="Label_Telefono">
                    <span class="contenido_Telefono">Telefono.</span>
                </label>
            </div>

            <div class="seccion">
                <input type="text" name="Correo" value="{{dat.3}}" autocomplete="on" required>
                <label for="Correo" class="Label_Correo">
                    <span class="contenido_Correo">Correo.</span>
                </label>
            </div>
            
            <div class="seccion">
                <input type="text" name="Cedula" value="{{dat.4}}" autocomplete="off" required>
                <label for="Cedula" class="Label_Cedula">
                    <span class="contenido_Cedula">Cedula.</span>
                </label>
            </div>
            
            <div class="seccion">
                <input type="text" name="Fecha_Afiliacion" value="{{dat.5}}" autocomplete="off" required>
                <label for="Fecha_Afiliacion" class="LabelFecha_Afiliacion">
                    <span class="contenido_Fecha_Afiliacion">Fecha de afiliación.</span>
                </label>
            </div>

        </div>

        <button type="submit" class="btn_guardar">
            Guardar

        </button>

    </form>

    
{%endblock%}
